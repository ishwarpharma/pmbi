<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMBI Order System</title>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f8fb;
    }

    /* HEADER */
    .topbar {
      background: #1E73BE;
      color: white;
      padding: 14px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .subtext {
      font-size: 13px;
      opacity: 0.9;
    }

    .container {
      padding: 10px;
    }

    /* LOGIN */
    .login-box {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #F58220;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    /* SEARCH BAR */
    .search-box {
      position: sticky;
      top: 0;
      background: white;
      padding: 10px;
      z-index: 10;
      border-bottom: 1px solid #ddd;
    }

    .search-box input {
      border: 2px solid #1E73BE;
      border-radius: 25px;
      padding-left: 15px;
    }

    /* ACTION BUTTONS */
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .action-row button {
      flex: 1;
      font-size: 14px;
      padding: 10px;
    }

    .reset-btn {
      background: #6c757d;
    }

    .cart-btn {
      background: #28a745;
    }

    /* PRODUCT LIST */
    .product {
      background: white;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border-left: 5px solid #1E73BE;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .product:hover {
      background: #f1f7ff;
    }

    .highlight {
      background: yellow;
      font-weight: bold;
    }

    .back-btn {
      background: #555;
      margin-bottom: 10px;
    }

    .warning-text {
      font-size: 12px;
      color: red;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  🏥 Jan Aushadhi Order Portal  
  <div class="subtext">Ishwar Pharma Nagpur</div>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input type="text" id="storeCode" placeholder="🏪 Store Code">
  <input type="text" id="city" placeholder="📍 City / District">
  <input type="number" id="mobile" placeholder="📱 Mobile Number">

  <button onclick="startApp()">Start Ordering</button>

  <div class="warning-text">
    ⚠️ You can browse without filling details, but order will NOT be processed without Store Code, City, and Mobile Number.
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;" class="container">

  <!-- SEARCH -->
  <div class="search-box">

    <input 
      type="text" 
      id="search" 
      placeholder="🔍 Search Drug Code or Name"
      onkeyup="searchProducts()" 
    >

    <!-- ACTION BUTTONS -->
    <div class="action-row">
      <button class="reset-btn" onclick="resetSearch()">Reset</button>
      <button class="cart-btn" onclick="openCart()">🛒 View Cart</button>
    </div>

  </div>

  <!-- PRODUCTS / DETAILS / CART VIEW -->
  <div id="products"></div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
