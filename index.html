<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMBI Order System</title>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Internal Styling -->
  <style>
    .topbar {
      background: #1E73BE;
      color: white;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .subtext {
      font-size: 13px;
      opacity: 0.9;
    }

    .container {
      padding: 10px;
    }

    .search-box {
      position: sticky;
      top: 0;
      background: white;
      padding: 10px;
      z-index: 10;
      border-bottom: 1px solid #ddd;
    }

    .search-box input {
      border: 2px solid #1E73BE;
      font-size: 16px;
      border-radius: 25px;
      padding-left: 15px;
      width: 100%;
      padding: 12px;
    }

    .cart {
      max-height: 220px;
      overflow-y: auto;
    }

    .place-btn {
      background: green;
      margin-top: 5px;
    }

    .warning-text {
      font-size: 12px;
      color: red;
      margin-top: 5px;
    }

    /* LIST VIEW STYLE */
    .product {
      background: white;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border-left: 5px solid #1E73BE;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    /* HIGHLIGHT */
    .highlight {
      background: yellow;
      font-weight: bold;
    }

    /* BACK BUTTON */
    .back-btn {
      background: #555;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  🏥 Jan Aushadhi Order Portal  
  <div class="subtext">Ishwar Pharma Nagpur</div>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input type="text" id="storeCode" placeholder="🏪 Store Code">
  <input type="text" id="city" placeholder="📍 City / District">
  <input type="number" id="mobile" placeholder="📱 Mobile Number">

  <button onclick="startApp()">Start Ordering</button>

  <div class="warning-text">
    ⚠️ You can browse without filling details, but order will NOT be processed without Store Code, City, and Mobile Number.
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;" class="container">

  <!-- SEARCH -->
  <div class="search-box">
    <input 
      type="text" 
      id="search" 
      placeholder="🔍 Search Drug Code or Name"
      onkeyup="searchProducts()" 
      onfocus="displayProducts(data)"
    >
  </div>

  <!-- PRODUCTS LIST / DETAIL -->
  <div id="products"></div>

  <!-- CART -->
  <div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cartItems"></div>
    <button class="place-btn" onclick="placeOrder()">Place Order</button>
  </div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
