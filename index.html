<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CADILA Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage" class="center">
  <h2>Login</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none">

  <div class="header">
    <h2 id="dashboardTitle"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="filters">
    <select id="period">
      <option>All Time</option>
      <option>This Month</option>
      <option>Last 3 Months</option>
      <option>Last 6 Months</option>
      <option>Last 1 Year</option>
    </select>

    <select id="area"></select>

    <div class="filter-box full">
      <input id="partySearch" placeholder="Search Party">
      <div id="partyDropdown" class="dropdown"></div>
      <span class="clear-btn" onclick="resetParty()">✖</span>
    </div>

    <div class="filter-box full">
      <input id="itemSearch" placeholder="Search Item">
      <div id="itemDropdown" class="dropdown"></div>
      <span class="clear-btn" onclick="resetItem()">✖</span>
    </div>
  </div>

  <div class="card big" id="totalSales"></div>

  <canvas id="monthChart"></canvas>

  <div class="box">
    <h3>Party Wise Sale</h3>
    <div id="partyPreview" class="table"></div>
  </div>

  <div class="box">
    <h3>Item Wise Sale</h3>
    <div id="itemPreview" class="table"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="users.js"></script>
<script src="script.js"></script>

</body>
</html>
